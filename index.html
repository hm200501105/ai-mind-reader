<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI读心术</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a1a;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  position: relative;
}

/* 星空背景 */
.stars {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--duration) infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* 页面通用 */
.page {
  display: none;
  position: relative;
  z-index: 1;
  animation: fadeIn 0.6s ease;
}

.page.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  font-size: 28px;
  text-align: center;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

h2 {
  font-size: 20px;
  text-align: center;
  margin-bottom: 16px;
  color: #c4b5fd;
}

.subtitle {
  text-align: center;
  color: #94a3b8;
  font-size: 14px;
  margin-bottom: 30px;
}

.step-indicator {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}

.step-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #334155;
  transition: all 0.3s;
}

.step-dot.active {
  background: #a78bfa;
  box-shadow: 0 0 8px #a78bfa;
}

.step-dot.done {
  background: #34d399;
}

/* 首页 */
.intro-icon {
  text-align: center;
  font-size: 80px;
  margin: 40px 0 20px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.intro-desc {
  text-align: center;
  color: #cbd5e1;
  font-size: 15px;
  line-height: 1.8;
  margin-bottom: 40px;
}

.btn-primary {
  display: block;
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  background: linear-gradient(135deg, #7c3aed, #3b82f6);
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
}

.btn-primary:active {
  transform: scale(0.97);
}

/* 画板页 */
.canvas-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  background: #1e1b4b;
  border-radius: 16px;
  border: 2px solid #4c1d95;
  overflow: hidden;
  margin-bottom: 16px;
  touch-action: none;
}

.canvas-wrap canvas {
  width: 100%;
  height: 100%;
  cursor: crosshair;
}

.canvas-hint {
  text-align: center;
  color: #94a3b8;
  font-size: 13px;
  margin-bottom: 16px;
}

.canvas-tools {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
}

.tool-btn {
  padding: 8px 16px;
  border: 1px solid #4c1d95;
  border-radius: 8px;
  background: #1e1b4b;
  color: #c4b5fd;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.tool-btn:active, .tool-btn.active {
  background: #4c1d95;
  color: #fff;
}

/* 颜色选择 */
.color-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.color-card {
  aspect-ratio: 1;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
  border: 3px solid transparent;
  position: relative;
}

.color-card.selected {
  border-color: #fff;
  transform: scale(0.92);
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

.color-card.selected::after {
  content: '✓';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 28px;
  color: #fff;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.color-card.disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* 图片选择 */
.image-options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.image-option {
  aspect-ratio: 1;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
  border: 3px solid #1e293b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  background: #1e1b4b;
}

.image-option:active {
  transform: scale(0.95);
}

.image-option.selected {
  border-color: #a78bfa;
  background: #2e1065;
  box-shadow: 0 0 15px rgba(167,139,250,0.3);
}

/* 词云选择 */
.word-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

.word-tag {
  padding: 10px 18px;
  border-radius: 20px;
  border: 1px solid #334155;
  background: #1e293b;
  color: #cbd5e1;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s;
}

.word-tag:active {
  transform: scale(0.95);
}

.word-tag.selected {
  border-color: #a78bfa;
  background: #4c1d95;
  color: #fff;
}

/* 门选择 */
.door-options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}

.door-card {
  padding: 20px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.3s;
  border: 2px solid #1e293b;
  text-align: center;
  background: linear-gradient(180deg, #1e1b4b 0%, #0f172a 100%);
}

.door-card:active {
  transform: scale(0.95);
}

.door-card.selected {
  border-color: #a78bfa;
  box-shadow: 0 0 20px rgba(167,139,250,0.3);
}

.door-icon {
  font-size: 48px;
  margin-bottom: 8px;
}

.door-label {
  font-size: 13px;
  color: #94a3b8;
}

/* 加载页 */
.loading-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
  text-align: center;
}

.brain-scan {
  width: 150px;
  height: 150px;
  position: relative;
  margin-bottom: 30px;
}

.brain-icon {
  font-size: 80px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}

.scan-ring {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border: 2px solid #7c3aed;
  border-radius: 50%;
  animation: scan-rotate 2s linear infinite;
}

.scan-ring::before {
  content: '';
  position: absolute;
  top: -2px;
  left: 50%;
  width: 8px;
  height: 8px;
  background: #a78bfa;
  border-radius: 50%;
  box-shadow: 0 0 10px #a78bfa;
}

.scan-ring:nth-child(2) {
  top: 15px; left: 15px; right: 15px; bottom: 15px;
  border-color: #3b82f6;
  animation-direction: reverse;
  animation-duration: 3s;
}

.scan-ring:nth-child(2)::before {
  background: #60a5fa;
  box-shadow: 0 0 10px #60a5fa;
}

@keyframes scan-rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.loading-text {
  color: #a78bfa;
  font-size: 16px;
  margin-bottom: 12px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.loading-detail {
  color: #64748b;
  font-size: 13px;
  max-width: 280px;
}

.loading-progress {
  width: 200px;
  height: 4px;
  background: #1e293b;
  border-radius: 2px;
  margin-top: 20px;
  overflow: hidden;
}

.loading-bar {
  height: 100%;
  background: linear-gradient(90deg, #7c3aed, #3b82f6, #34d399);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s;
}

/* 报告页 */
.report-reveal {
  text-align: center;
  padding: 20px 0 10px;
  animation: revealPulse 1.5s ease-in-out;
}

.report-reveal .reveal-icon {
  font-size: 48px;
  margin-bottom: 8px;
  animation: revealBounce 0.8s ease;
}

.report-reveal .reveal-text {
  font-size: 16px;
  color: #a78bfa;
  font-weight: 600;
}

@keyframes revealPulse {
  0% { opacity: 0; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.05); }
  100% { transform: scale(1); }
}

@keyframes revealBounce {
  0% { transform: translateY(-20px); opacity: 0; }
  60% { transform: translateY(5px); }
  100% { transform: translateY(0); opacity: 1; }
}

.report-card {
  background: linear-gradient(135deg, #1e1b4b, #0f172a);
  border: 1px solid #4c1d95;
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 16px;
  animation: cardSlideUp 0.8s ease 0.3s both;
}

@keyframes cardSlideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.report-header {
  text-align: center;
  margin-bottom: 20px;
}

.report-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  border: 3px solid #7c3aed;
  box-shadow: 0 0 20px rgba(124,58,237,0.4);
}

.report-type {
  font-size: 22px;
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 4px;
}

.report-subtitle {
  color: #94a3b8;
  font-size: 13px;
}

.report-section {
  margin-bottom: 20px;
}

.report-section-title {
  font-size: 14px;
  color: #a78bfa;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.trait-bar {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}

.trait-label {
  width: 70px;
  font-size: 12px;
  color: #94a3b8;
}

.trait-track {
  flex: 1;
  height: 6px;
  background: #1e293b;
  border-radius: 3px;
  overflow: hidden;
}

.trait-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s ease;
}

.trait-value {
  width: 36px;
  text-align: right;
  font-size: 12px;
  color: #cbd5e1;
}

.secret-list {
  list-style: none;
}

.secret-list li {
  padding: 10px 12px;
  background: #0f172a;
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 14px;
  color: #e2e8f0;
  border-left: 3px solid #7c3aed;
}

.soul-colors {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.soul-color {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
}

.report-quote {
  text-align: center;
  font-style: italic;
  color: #94a3b8;
  font-size: 14px;
  padding: 16px;
  border-top: 1px solid #1e293b;
  margin-top: 16px;
}

.btn-share {
  display: block;
  width: 100%;
  padding: 14px;
  border: 2px solid #7c3aed;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  color: #a78bfa;
  background: transparent;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 12px;
}

.btn-share:active {
  background: #7c3aed;
  color: #fff;
}

.btn-restart {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  color: #64748b;
  background: #1e293b;
  cursor: pointer;
}

/* 提示弹窗 */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  background: rgba(124,58,237,0.9);
  border-radius: 8px;
  font-size: 14px;
  color: #fff;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
}

.toast.show {
  opacity: 1;
}
</style>
</head>
<body>

<!-- 星空背景 -->
<div class="stars" id="stars"></div>

<div class="container">
  <!-- 首页 -->
  <div class="page active" id="page-intro">
    <div class="intro-icon">🔮</div>
    <h1>AI 读心术</h1>
    <p class="subtitle">你的潜意识，我全都知道</p>
    <p class="intro-desc">
      通过你的直觉反应<br>
      AI将深度解析你的隐藏人格<br>
      揭示那些你没说出口的秘密
    </p>
    <button class="btn-primary" onclick="startTest()">开始读心 →</button>
  </div>

  <!-- Step 1: 画板 -->
  <div class="page" id="page-draw">
    <div class="step-indicator" id="steps-1">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
    <h2>凭直觉画一个图形</h2>
    <p class="canvas-hint">不用想太多，随手画就好</p>
    <div class="canvas-wrap">
      <canvas id="drawCanvas"></canvas>
    </div>
    <div class="canvas-tools">
      <button class="tool-btn" onclick="clearCanvas()">清除</button>
      <button class="tool-btn" onclick="undoCanvas()">撤销</button>
    </div>
    <button class="btn-primary" onclick="submitDraw()">画好了 →</button>
  </div>

  <!-- Step 2: 颜色选择 -->
  <div class="page" id="page-color">
    <div class="step-indicator" id="steps-2">
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
    <h2>选3个让你最舒服的颜色</h2>
    <p class="subtitle">凭第一感觉，不要犹豫</p>
    <div class="color-grid" id="colorGrid"></div>
    <button class="btn-primary" id="btnColor" onclick="submitColor()" disabled>已选 0/3</button>
  </div>

  <!-- Step 3: 图片联想 -->
  <div class="page" id="page-image">
    <div class="step-indicator" id="steps-3">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
    <h2>你第一眼看到了什么？</h2>
    <p class="subtitle">凝视下方图案，选择你的直觉</p>
    <div class="image-options" id="imageOptions"></div>
  </div>

  <!-- Step 4: 词语选择 -->
  <div class="page" id="page-word">
    <div class="step-indicator" id="steps-4">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
    <h2>选一个词形容今天的自己</h2>
    <p class="subtitle">哪个词最先打动你</p>
    <div class="word-cloud" id="wordCloud"></div>
  </div>

  <!-- Step 5: 选门 -->
  <div class="page" id="page-door">
    <div class="step-indicator" id="steps-5">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
    </div>
    <h2>选一扇门走进去</h2>
    <p class="subtitle">直觉告诉你哪扇门后面有答案</p>
    <div class="door-options" id="doorOptions"></div>
  </div>

  <!-- 加载页 -->
  <div class="page loading-page" id="page-loading">
    <div class="brain-scan">
      <div class="scan-ring"></div>
      <div class="scan-ring"></div>
      <div class="brain-icon">🧠</div>
    </div>
    <div class="loading-text" id="loadingText">正在连接神经网络...</div>
    <div class="loading-detail" id="loadingDetail">解析你的潜意识数据</div>
    <div class="loading-progress">
      <div class="loading-bar" id="loadingBar"></div>
    </div>
  </div>

  <!-- 报告页 -->
  <div class="page" id="page-report">
    <div class="report-reveal">
      <div class="reveal-icon">🔮</div>
      <div class="reveal-text">你的灵魂已被读取</div>
    </div>
    <div class="report-card" id="reportCard"></div>
    <div style="text-align:center;color:#64748b;font-size:12px;margin:12px 0 16px;">↓ 长按报告可截图分享 ↓</div>
    <button class="btn-primary" onclick="saveReport()" style="margin-bottom:12px;">📸 保存报告截图</button>
    <button class="btn-restart" onclick="restart()">🔄 再测一次</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 数据配置 ==========

const COLORS = [
  { hex: '#ef4444', name: '热情红', trait: 'passion' },
  { hex: '#f97316', name: '活力橙', trait: 'energy' },
  { hex: '#eab308', name: '阳光黄', trait: 'optimism' },
  { hex: '#22c55e', name: '生机绿', trait: 'harmony' },
  { hex: '#06b6d4', name: '通透青', trait: 'clarity' },
  { hex: '#3b82f6', name: '深邃蓝', trait: 'wisdom' },
  { hex: '#8b5cf6', name: '神秘紫', trait: 'intuition' },
  { hex: '#ec4899', name: '浪漫粉', trait: 'romance' },
  { hex: '#1e293b', name: '静谧黑', trait: 'depth' },
];

const IMAGE_TESTS = [
  {
    emoji: '🌀',
    question: '盯着这个漩涡，你感受到...',
    options: [
      { text: '被吸入深处', icon: '🕳️', trait: 'seeker' },
      { text: '旋转的能量', icon: '💫', trait: 'dynamic' },
      { text: '平静的秩序', icon: '☯️', trait: 'balanced' },
      { text: '无限的可能', icon: '✨', trait: 'dreamer' },
    ]
  },
  {
    emoji: '🔥',
    question: '这团火焰让你想到...',
    options: [
      { text: '毁灭与重生', icon: '🌋', trait: 'seeker' },
      { text: '温暖的壁炉', icon: '🏠', trait: 'balanced' },
      { text: '燃烧的野心', icon: '🚀', trait: 'dynamic' },
      { text: '即将熄灭的烛光', icon: '🕯️', trait: 'dreamer' },
    ]
  },
  {
    emoji: '🌊',
    question: '面对这片海浪，你的第一反应是...',
    options: [
      { text: '想跳进去', icon: '🏊', trait: 'dynamic' },
      { text: '站在岸边静静看', icon: '🧘', trait: 'balanced' },
      { text: '想知道海底有什么', icon: '🐚', trait: 'seeker' },
      { text: '听见了某种旋律', icon: '🎵', trait: 'dreamer' },
    ]
  },
  {
    emoji: '🌑',
    question: '这轮黑月亮，你觉得它在...',
    options: [
      { text: '隐藏着秘密', icon: '🔐', trait: 'seeker' },
      { text: '等待被点亮', icon: '💡', trait: 'dreamer' },
      { text: '吞噬一切', icon: '🕳️', trait: 'dynamic' },
      { text: '安静地守护', icon: '🛡️', trait: 'balanced' },
    ]
  },
  {
    emoji: '⚡',
    question: '一道闪电劈下来，你会...',
    options: [
      { text: '伸手去接', icon: '✋', trait: 'dynamic' },
      { text: '闭眼许愿', icon: '🙏', trait: 'dreamer' },
      { text: '数秒判断距离', icon: '🧮', trait: 'balanced' },
      { text: '觉得是某种暗示', icon: '🔮', trait: 'seeker' },
    ]
  },
];

const ALL_WORDS = [
  { text: '自由', trait: 'freedom' },
  { text: '温暖', trait: 'warmth' },
  { text: '锋利', trait: 'edge' },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr, n) {
  return shuffle(arr).slice(0, n);
}

function randomizeQuestions() {
  currentImageTest = IMAGE_TESTS[Math.floor(Math.random() * IMAGE_TESTS.length)];

  currentDrawPrompt = DRAW_PROMPTS[Math.floor(Math.random() * DRAW_PROMPTS.length)];
}

// ========== 画板 ==========

let canvas, ctx;
let drawing = false;
let paths = [];
let currentPath = [];

function initCanvas() {
  canvas = document.getElementById('drawCanvas');
  const wrap = canvas.parentElement;
  const rect = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#a78bfa';

  canvas.addEventListener('pointerdown', startDraw);
  canvas.addEventListener('pointermove', doDraw);
  canvas.addEventListener('pointerup', endDraw);
  canvas.addEventListener('pointerleave', endDraw);
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  drawing = true;
  currentPath = [getPos(e)];
  ctx.beginPath();
  ctx.moveTo(currentPath[0].x, currentPath[0].y);
}

function doDraw(e) {
  if (!drawing) return;
  const pos = getPos(e);
  currentPath.push(pos);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function endDraw() {
  if (!drawing) return;
  drawing = false;
  if (currentPath.length > 1) {
    paths.push([...currentPath]);
  }
  currentPath = [];
}

function clearCanvas() {
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  paths = [];
}

function undoCanvas() {
  paths.pop();
  redrawCanvas();
}

function redrawCanvas() {
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  for (const path of paths) {
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) {
      ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.stroke();
  }
}

function analyzeDrawing() {
  if (paths.length === 0) return { shape: 'none', energy: 'low', style: 'minimal' };

  let totalPoints = 0;
  let totalLength = 0;
  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  let dirChanges = 0;

  for (const path of paths) {
    totalPoints += path.length;
    for (let i = 1; i < path.length; i++) {
      const dx = path[i].x - path[i-1].x;
      const dy = path[i].y - path[i-1].y;
      totalLength += Math.sqrt(dx*dx + dy*dy);
      if (path[i].x < xMin) xMin = path[i].x;
      if (path[i].x > xMax) xMax = path[i].x;
      if (path[i].y < yMin) yMin = path[i].y;
      if (path[i].y > yMax) yMax = path[i].y;
    }
    for (let i = 2; i < path.length; i++) {
      const d1x = path[i-1].x - path[i-2].x;
      const d1y = path[i-1].y - path[i-2].y;
      const d2x = path[i].x - path[i-1].x;
      const d2y = path[i].y - path[i-1].y;
      const cross = d1x * d2y - d1y * d2x;
      if (Math.abs(cross) > 5) dirChanges++;
    }
  }

  const width = xMax - xMin;
  const height = yMax - yMin;
  const area = width * height;
  const density = totalPoints / Math.max(area, 1) * 1000;
  const complexity = dirChanges / Math.max(totalPoints, 1);

  let energy = totalLength > 500 ? 'high' : totalLength > 200 ? 'medium' : 'low';
  let style = complexity > 0.3 ? 'chaotic' : paths.length > 3 ? 'detailed' : 'simple';
  let shape = width/height > 1.5 ? 'wide' : height/width > 1.5 ? 'tall' : 'balanced';

  return { energy, style, shape, totalLength, paths: paths.length, density };
}

function submitDraw() {
  if (paths.length === 0) {
    showToast('画点什么吧，随便画就好~');
    return;
  }
  userChoices.drawTraits = analyzeDrawing();
  showPage('page-color');
}

function initColors() {
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  COLORS.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'color-card';
    div.style.background = c.hex;
    div.dataset.index = i;
    div.onclick = () => toggleColor(i, div);
    grid.appendChild(div);
  });
}

function toggleColor(index, el) {
  const selected = userChoices.colors;
  const pos = selected.indexOf(index);
  if (pos > -1) {
    selected.splice(pos, 1);
    el.classList.remove('selected');
  } else {
    if (selected.length >= 3) return;
    selected.push(index);
    el.classList.add('selected');
  }
  const btn = document.getElementById('btnColor');
  btn.textContent = `已选 ${selected.length}/3`;
  btn.disabled = selected.length < 3;

  document.querySelectorAll('.color-card').forEach((card, i) => {
    if (selected.length >= 3 && !selected.includes(i)) {
      card.classList.add('disabled');
    } else {
      card.classList.remove('disabled');
    }
  });
}

function submitColor() {
  if (userChoices.colors.length < 3) return;
  showPage('page-image');
}

  { text: '扫描绘画特征...', detail: '分析笔触压力与方向' },

];

function startLoading() {
  showPage('page-loading');

  const bar = document.getElementById('loadingBar');

  function nextStep() {
    if (step >= LOADING_STEPS.length) {
      setTimeout(() => generateReport(), 500);
      return;
    }
    document.getElementById('loadingText').textContent = LOADING_STEPS[step].text;
    document.getElementById('loadingDetail').textContent = LOADING_STEPS[step].detail;

// ========== 生成报告 ==========

function generateReport() {
  const scores = {};
  const keys = Object.keys(PERSONALITIES);
  keys.forEach(k => scores[k] = 0);

  // 画板分析影响
  const draw = userChoices.drawTraits || {};
  if (draw.energy === 'high') {
    scores.fire_warrior += 3; scores.chaos_artist += 2; scores.phoenix_rebel += 2; scores.flame_romantic += 1;
  }
  if (draw.energy === 'medium') {
    scores.shadow_mirror += 1; scores.time_wanderer += 1; scores.crystal_analyst += 1;
  }
  if (draw.energy === 'low') {
    scores.ocean_sage += 2; scores.garden_healer += 2; scores.cloud_drifter += 2; scores.time_wanderer += 1;
  }
  if (draw.style === 'chaotic') {
    scores.chaos_artist += 3; scores.mystic_dreamer += 1; scores.cloud_drifter += 2; scores.flame_romantic += 1;
  }
  if (draw.style === 'simple') {
    scores.ocean_sage += 2; scores.wild_wolf += 2; scores.garden_healer += 1;
  }
  if (draw.style === 'detailed') {
    scores.crystal_analyst += 3; scores.mystic_dreamer += 1; scores.time_wanderer += 1;
  }
  if (draw.shape === 'wide') { scores.fire_warrior += 1; scores.phoenix_rebel += 1; }
  if (draw.shape === 'tall') { scores.mystic_dreamer += 1; scores.cloud_drifter += 1; }
  if (draw.shape === 'balanced') { scores.shadow_mirror += 1; scores.crystal_analyst += 1; }

  // 颜色影响
  userChoices.colors.forEach(ci => {
    const trait = COLORS[ci].trait;
    switch(trait) {
      case 'passion': scores.fire_warrior += 2; scores.flame_romantic += 2; scores.phoenix_rebel += 1; break;
      case 'energy': scores.fire_warrior += 2; scores.phoenix_rebel += 1; break;
      case 'intuition': scores.mystic_dreamer += 2; scores.cloud_drifter += 1; break;
      case 'depth': scores.shadow_mirror += 2; scores.ocean_sage += 1; scores.wild_wolf += 1; break;
      case 'wisdom': scores.ocean_sage += 2; scores.crystal_analyst += 1; break;
      case 'clarity': scores.crystal_analyst += 2; scores.ocean_sage += 1; break;
      case 'harmony': scores.garden_healer += 2; scores.time_wanderer += 1; break;
      case 'romance': scores.flame_romantic += 2; scores.garden_healer += 1; break;
      case 'optimism': scores.chaos_artist += 2; scores.cloud_drifter += 1; break;
    }
  });

  // 图片联想影响
  switch(userChoices.imageChoice) {
    case 'seeker': scores.mystic_dreamer += 3; scores.crystal_analyst += 1; scores.time_wanderer += 1; break;
    case 'dynamic': scores.fire_warrior += 2; scores.phoenix_rebel += 2; scores.chaos_artist += 1; break;
    case 'balanced': scores.ocean_sage += 2; scores.garden_healer += 1; scores.shadow_mirror += 1; break;
    case 'dreamer': scores.cloud_drifter += 2; scores.flame_romantic += 2; scores.mystic_dreamer += 1; break;
  }

  // 词语影响
  switch(userChoices.wordChoice) {
    case 'freedom': scores.chaos_artist += 2; scores.wild_wolf += 1; break;
    case 'wild': scores.wild_wolf += 2; scores.chaos_artist += 1; break;
    case 'warmth': scores.garden_healer += 2; scores.flame_romantic += 1; break;
    case 'rhythm': scores.time_wanderer += 2; scores.garden_healer += 1; break;
    case 'edge': scores.fire_warrior += 2; scores.phoenix_rebel += 1; break;
    case 'fire': scores.phoenix_rebel += 2; scores.fire_warrior += 1; break;
    case 'mystery': scores.mystic_dreamer += 2; scores.shadow_mirror += 1; break;
    case 'ethereal': scores.cloud_drifter += 2; scores.mystic_dreamer += 1; break;
    case 'aspiration': scores.time_wanderer += 2; scores.flame_romantic += 1; break;
    case 'anchor': scores.ocean_sage += 2; scores.wild_wolf += 1; break;
    case 'rebel': scores.phoenix_rebel += 3; scores.chaos_artist += 1; break;
    case 'drift': scores.cloud_drifter += 2; scores.time_wanderer += 1; break;
    case 'obsession': scores.fire_warrior += 1; scores.flame_romantic += 2; break;
    case 'clarity_w': scores.crystal_analyst += 2; scores.ocean_sage += 1; break;
  }

  // 门选择影响
  switch(userChoices.doorChoice) {
    case 'mystic': scores.mystic_dreamer += 3; scores.shadow_mirror += 1; scores.cloud_drifter += 1; break;
    case 'thinker': scores.ocean_sage += 2; scores.crystal_analyst += 2; scores.time_wanderer += 1; break;
    case 'healer': scores.garden_healer += 3; scores.flame_romantic += 1; break;
    case 'warrior': scores.fire_warrior += 2; scores.phoenix_rebel += 2; scores.wild_wolf += 1; break;
  }

  // 找最高分
  let maxKey = keys[0];
  keys.forEach(k => { if (scores[k] > scores[maxKey]) maxKey = k; });

  renderReport(PERSONALITIES[maxKey]);
}

function renderReport(p) {
  const card = document.getElementById('reportCard');
  let traitsHtml = '';
  Object.entries(p.traits).forEach(([label, value]) => {
    const hue = value > 70 ? '270' : value > 50 ? '220' : '160';
    traitsHtml += `
      <div class="trait-bar">
        <span class="trait-label">${label}</span>
        <div class="trait-track"><div class="trait-fill" style="width:${value}%;background:hsl(${hue},70%,60%)"></div></div>
        <span class="trait-value">${value}%</span>
      </div>`;
  });

  const selectedSecrets = pickRandom(p.secrets, 3);
  const selectedQuote = p.quotes[Math.floor(Math.random() * p.quotes.length)];

  let secretsHtml = selectedSecrets.map(s => `<li>「${s}」</li>`).join('');
  let colorsHtml = p.colors.map(c => `<div class="soul-color" style="background:${c}"></div>`).join('');

  card.innerHTML = `
    <div class="report-header">
      <div class="report-avatar" style="background:linear-gradient(135deg,${p.colors[0]},${p.colors[1]})">${p.icon}</div>
      <div class="report-type">${p.type}</div>
      <div class="report-subtitle">${p.subtitle}</div>
    </div>

    <div class="report-section">
      <div class="report-section-title">📊 灵魂数据</div>
      ${traitsHtml}
    </div>

    <div class="report-section">
      <div class="report-section-title">🔓 你没说但我知道的事</div>
      <ul class="secret-list">${secretsHtml}</ul>
    </div>

    <div class="report-section">
      <div class="report-section-title">🎨 灵魂配色</div>
      <div class="soul-colors">${colorsHtml}</div>
    </div>

    <div class="report-quote">"${selectedQuote}"</div>
  `;

  showPage('page-report');

  setTimeout(() => {
    document.querySelectorAll('.trait-fill').forEach(el => {
      el.style.width = el.style.width;
    });
    document.getElementById('reportCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

}
